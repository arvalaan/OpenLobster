# Build cross-platform binaries and publish a GitHub Release when a tag is pushed.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "apps/backend/go.mod"
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build --filter=@openlobster/frontend

      - name: Build cross-platform binaries
        working-directory: apps/backend
        run: pnpm run build:cross

      - name: Rename binaries with version tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv dist/daemon/openlobster-darwin-arm64  dist/daemon/openlobster-${VERSION}-darwin-arm64
          mv dist/daemon/openlobster-linux-arm64   dist/daemon/openlobster-${VERSION}-linux-arm64
          mv dist/daemon/openlobster-linux-amd64   dist/daemon/openlobster-${VERSION}-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/daemon/openlobster-*
