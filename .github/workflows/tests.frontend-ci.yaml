name: Frontend CI

on:
  push:
    branches: [ master, 'feature/**', 'fix/**', 'refactor/**', 'chore/**' ]
    paths:
      - 'apps/frontend/**'
      - 'packages/ui/**'
      - 'packages/ui-tests/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/tests.frontend-ci.yaml'
  pull_request:
    branches: [ master ]
    paths:
      - 'apps/frontend/**'
      - 'packages/ui/**'
      - 'packages/ui-tests/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/tests.frontend-ci.yaml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @openlobster/frontend typecheck

      - name: Run ESLint
        run: pnpm --filter @openlobster/frontend lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @openlobster/frontend test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/frontend/coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @openlobster/frontend exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @openlobster/frontend test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7
