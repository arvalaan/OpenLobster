# Build cross-platform binaries and publish a GitHub Release when a tag is pushed.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "apps/backend/go.mod"
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build --filter=@openlobster/frontend

      - name: Build cross-platform binaries
        working-directory: apps/backend
        run: pnpm run build:cross

      - name: Rename binaries with version tag
        run: |
          VERSION="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          mv dist/daemon/openlobster-darwin-arm64  dist/daemon/openlobster-${VERSION}-darwin-arm64
          mv dist/daemon/openlobster-linux-arm64   dist/daemon/openlobster-${VERSION}-linux-arm64
          mv dist/daemon/openlobster-linux-amd64   dist/daemon/openlobster-${VERSION}-linux-amd64

      - name: Upload binaries to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          gh release upload "${VERSION}" dist/daemon/openlobster-* --clobber
