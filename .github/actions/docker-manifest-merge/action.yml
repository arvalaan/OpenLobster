name: 'Docker Manifest Merge'
description: 'Descarga los digests y hace el merge de manifiestos multi-arquitectura.'
inputs:
  app:
    required: true
    description: 'Nombre de la app'
runs:
  using: 'composite'
  steps:
    - name: Set lowercase image name
      id: set-image-name
      shell: bash
      run: |
        echo "image-name=$(echo 'ghcr.io/${{ github.repository }}/${{ inputs.app }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: /tmp/digests/${{ inputs.app }}
        pattern: digests-${{ inputs.app }}-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log into ghcr.io registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.set-image-name.outputs.image-name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=,format=short
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Create manifest list and push
      shell: bash
      working-directory: /tmp/digests/${{ inputs.app }}
      run: |
        docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          $(printf '${{ steps.set-image-name.outputs.image-name }}@sha256:%s ' *)

    - name: Inspect image
      shell: bash
      run: |
        docker buildx imagetools inspect ${{ steps.set-image-name.outputs.image-name }}:${{ steps.meta.outputs.version }}

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-name: ${{ steps.set-image-name.outputs.image-name }}
        subject-digest: ${{ steps.meta.outputs.digest }}
        push-to-registry: true
